# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    container_name: music_collab_db
    environment:
      POSTGRES_USER: ${DB_USER:-collab_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-collab_pass}
      POSTGRES_DB: ${DB_NAME:-collab_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-collab_user} -d ${DB_NAME:-collab_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: music_collab_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
